version: '3.8'

services:
  terminal:
    build: .
    container_name: hermes-quant-terminal
    ports:
      - "8501:8501"
    volumes:
      # Mount the local data folder so ChromaDB and CSV downloads persist across container restarts
      - ./data:/app/data
    environment:
      # If you want to use the Ollama container below, uncomment this:
      # - OLLAMA_BASE_URL=http://ollama:11434
      
      # If you are running Ollama natively on your Mac/Windows host machine, uncomment this:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # OPTIONAL: You can run Ollama entirely inside Docker by uncommenting the block below.
  # However, running Ollama natively on your host machine is usually faster for GPU access.
  # 
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: hermes-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

# volumes:
#   ollama_data: